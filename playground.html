<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Playground — Complete Intro to Vue 3</title>
	</head>
	<body>
		<h1>Hello Playground</h1>
		<div id="app">
			<p v-if="message.length % 2 === 0">Even: {{ message.toUpperCase() }}</p>
			<p v-else>Odd : {{ message }}</p>
			<ul>
				<li v-for="val in listOfNumbs">
          {{ val.name }}
          <ul>
            <li v-for="num in val.list">{{num}}</li>
          </ul>
        </li>
			</ul>
		</div>
		<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
		<script>
			const { createApp } = Vue;

			const app = createApp({
				data() {
					return {
						message: "Hello Vue!",
						listOfNumbs: [
							{ name: 0, id: "b674c468-5b91-49cb-b5a3-5981837ed977", list : [1,2,3] },
							{ name: 1, id: "d85a011b-f95b-47bf-b7a8-504b46e6cc96", list : [1,2,3] },
							{ name: 2, id: "e697c72a-6c8c-495a-b76a-64a7238b4d21", list : [1,2,3] },
							{ name: 3, id: "bcd679d9-3898-468d-a2b6-7adc95130802", list : [1,2,3] },
							{ name: 4, id: "a0b25edd-ed61-4e76-8fac-0bc7c07bb053", list : [1,2,3] },
						],
					};
				},
			});
			app.mount("#app");
		</script>
	</body>
</html>
